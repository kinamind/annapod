name: Cloudflare Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/web

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build Pages output
        run: pnpm build

      - name: Ensure Pages project exists
        run: pnpm exec wrangler pages project create annapod --production-branch main || true

      - name: Sync Pages runtime secrets
        run: |
          printf "%s" "$AI_API_KEY" | pnpm exec wrangler pages secret put AI_API_KEY --project-name annapod
          printf "%s" "$JWT_SECRET" | pnpm exec wrangler pages secret put JWT_SECRET --project-name annapod

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply annapod --remote --config wrangler.jsonc

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy out --project-name annapod --branch main --config wrangler.jsonc
